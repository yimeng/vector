name: Build Vector with greptimedb_wide_metrics

on:
  push:
    branches: [main, master]
    paths:
      - "src/sinks/greptimedb/**"
      - "src/sinks/mod.rs"
      - "Cargo.toml"
      - ".github/workflows/build-greptimedb-wide.yml"
  pull_request:
    branches: [main, master]
    paths:
      - "src/sinks/greptimedb/**"
      - "src/sinks/mod.rs"
      - "Cargo.toml"
      - ".github/workflows/build-greptimedb-wide.yml"
  workflow_dispatch:

env:
  CARGO_INCREMENTAL: "0"

jobs:
  build-x86_64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.92

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler libclang-dev libsasl2-dev

      - name: Build release binary
        run: cargo build --release

      - name: Strip binary
        run: strip target/release/vector

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: vector-x86_64-greptimedb-wide
          path: target/release/vector
          retention-days: 7
