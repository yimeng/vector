name: Build Vector with greptimedb_wide_metrics

on:
  push:
    branches: [main, master]
    paths:
      - "src/sinks/greptimedb/**"
      - "src/sinks/mod.rs"
      - "Cargo.toml"
      - ".github/workflows/build-greptimedb-wide.yml"
  pull_request:
    branches: [main, master]
    paths:
      - "src/sinks/greptimedb/**"
      - "src/sinks/mod.rs"
      - "Cargo.toml"
      - ".github/workflows/build-greptimedb-wide.yml"
  workflow_dispatch:

env:
  CARGO_INCREMENTAL: "0"

jobs:
  build-x86_64:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.92

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libclang-dev libsasl2-dev unzip curl
          curl -LO https://github.com/protocolbuffers/protobuf/releases/download/v24.4/protoc-24.4-linux-x86_64.zip
          sudo unzip protoc-24.4-linux-x86_64.zip -d /usr/local
          rm protoc-24.4-linux-x86_64.zip
          protoc --version

      - name: Build release binary
        run: >-
          cargo build --release --no-default-features
          --features "api,unix,vrl/stdlib,sinks-greptimedb_wide_metrics,sinks-greptimedb_metrics,sinks-greptimedb_logs,sources-opentelemetry,transforms-remap,sinks-blackhole,sinks-console"

      - name: Strip binary
        run: strip target/release/vector

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: vector-x86_64-greptimedb-wide
          path: target/release/vector
          retention-days: 7
